name: Build MD Reader

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build (Windows x64)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Generate icons from source
        run: npx @tauri-apps/cli icon src-tauri/icons/icon.png

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: 'MD Reader ${{ github.ref_name }}'
          releaseBody: |
            ## MD Reader ${{ github.ref_name }}
            
            ### 修复
            - 窗口控制（关闭/最大化/最小化）权限修复
            - 窗口拖拽支持
            - 大纲侧边栏不再遮挡正文
            - 大纲点击跳转流畅无卡顿
            - 支持 HTML 折叠标签（details/summary）
            - XSS 安全白名单过滤
            - Mermaid 安全等级升级
            - Tab 事件委托重构
            - 编辑模式竞态修复
            - 搜索防抖优化
          releaseDraft: ${{ startsWith(github.ref, 'refs/tags/') }}
          prerelease: false
          args: --target x86_64-pc-windows-msvc
